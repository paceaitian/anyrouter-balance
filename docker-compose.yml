services:
  anyrouter-balance:
    build: .
    container_name: anyrouter-balance
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - ADMIN_PASSWORD=your_password_here
      - RELAY_URL=https://api.ccui.cc
      - FEISHU_WEBHOOK=https://open.feishu.cn/open-apis/bot/v2/hook/c72a4993-bfa6-4780-8a13-b5acd051f1a8
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped
